name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; let an in-flight run finish rather than
# cancelling it, since a cancelled deploy can leave Pages on a half-updated
# artifact.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: packages/counters-web/.nvmrc

      - name: Install dependencies
        run: npm ci

      # Regenerates static/api/v1/** from the current hero .md source, so the
      # deployed site always reflects the latest committed hero data rather
      # than a possibly-stale committed JSON snapshot (EDD section 9).
      - name: Compile hero data
        run: npm run compile --workspace=counters-data-core

      # adapter-static build: copies static/ into the output and prerenders
      # every route (all hero pages plus the static routes) to real HTML.
      - name: Build site
        run: npm run build --workspace=counters-web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/counters-web/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

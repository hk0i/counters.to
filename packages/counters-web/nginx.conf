# adapter-static writes flat files like heroes/ana.html; GitHub Pages
# resolves clean URLs like /heroes/ana to that file automatically, but plain
# nginx doesn't unless told to. This mirrors that behavior for local testing.
server {
	listen 80;
	server_name _;
	root /usr/share/nginx/html;

	location / {
		try_files $uri $uri.html $uri/ =404;
	}

	error_page 404 /404.html;
}
